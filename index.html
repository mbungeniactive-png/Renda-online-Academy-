    <script>
      // Suppress third-party script errors to prevent "Script error." from triggering runtime faults
      window.addEventListener('error', function(e) {
        var isThirdParty = e.message === 'Script error.' || 
          (e.filename && (
            e.filename.indexOf('effectivecpmnetwork') > -1 || 
            e.filename.indexOf('elementalconsessionconsession') > -1 || 
            e.filename.indexOf('highperformanceformat') > -1 || 
            e.filename.indexOf('invoke.js') > -1
          ));
        if (isThirdParty) {
          e.stopImmediatePropagation();
          e.preventDefault();
        }
      }, true);
      
      window.onerror = function(message, source, lineno, colno, error) {
        var isThirdParty = message === 'Script error.' || 
          (source && (
            source.indexOf('effectivecpmnetwork') > -1 || 
            source.indexOf('elementalconsessionconsession') > -1 || 
            source.indexOf('highperformanceformat') > -1 || 
            source.indexOf('invoke.js') > -1
          ));
        if (isThirdParty) {
          return true; // Suppresses error reporting
        }
      };

      window.addEventListener('unhandledrejection', function(e) {
        // Prevent uncaught promise rejections from registering
        e.preventDefault();
      });
    </script>
